services:
  api:
    build: .
    container_name: sec-red-flag-engine
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]