services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sec-red-flag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sec-red-flag-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    command: ["npm", "run", "dev", "--", "-H", "0.0.0.0", "-p", "3000"]